<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Department Grading System</title>
<link rel="stylesheet" href="index.css">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="passi city college logo.jpg" alt="Logo 1">
        <div class="logo-text">Passi City College</div>
    </div>
    <div class="logo-container">
        <img src="BSIT 2.png" alt="Logo 2">
        <div class="logo-text">Bachelor of Science Information Technology</div>
    </div>
    <h1>BSIT Department Grading System</h1>
</header>

<div class="container">
    <div class="table-wrapper" style="display: none;"></div> <!-- Hidden, JS can use if needed -->

    <div class="edit-student">
        <input type="text" id="studentName" placeholder="Student Name">
        <input type="text" id="studentSection" placeholder="Section">
    </div>

    <div class="student-info" style="text-align:center; margin:15px 0; font-size:18px;">
        <strong>Student Name:</strong> <span id="displayName">-</span> |
        <strong>Section:</strong> <span id="displaySection">-</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Component</th>
                <th>Weight</th>
                <th>Grade (%)</th>
                <th>Weighted</th>
                <th>Remarks</th>
            </tr>
        </thead>
        <tbody id="gradeTable">
            <tr><td>Quiz</td><td>20%</td><td><input type="number" class="score" min="0" max="100" oninput="calculateAverage()"></td><td class="weighted">-</td><td class="remark"></td></tr>
            <tr><td>Laboratory</td><td>30%</td><td><input type="number" class="score" min="0" max="100" oninput="calculateAverage()"></td><td class="weighted">-</td><td class="remark"></td></tr>
            <tr><td>Assignment</td><td>10%</td><td><input type="number" class="score" min="0" max="100" oninput="calculateAverage()"></td><td class="weighted">-</td><td class="remark"></td></tr>
            <tr><td>Attendance</td><td>10%</td><td><input type="number" class="score" min="0" max="100" oninput="calculateAverage()"></td><td class="weighted">-</td><td class="remark"></td></tr>
            <tr><td>Major Exam</td><td>30%</td><td><input type="number" class="score" min="0" max="100" oninput="calculateAverage()"></td><td class="weighted">-</td><td class="remark"></td></tr>
        </tbody>
    </table>

    <div style="text-align:center;">
        <button class="calculate-btn" onclick="saveRecord()">Save Record</button>
        <button class="calculate-btn" onclick="resetForm()">Reset</button>
        <button class="calculate-btn" onclick="window.location.href='record student.html'">View Records</button>
    </div>

    <div class="average" id="average">Total Grade: 0.00%</div>

    <div class="result-status" id="resultStatus">
        <span id="resultText"></span>
    </div>

    <div id="notification" class="notification">Record Saved Successfully!</div>
</div>
<script src="index.js"></script>
</body>
</html>
