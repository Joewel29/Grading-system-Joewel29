<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Records - BSIT Grading System</title>
<link rel="stylesheet" href="index.css">
<style>
  /* Viewer-specific styles - now in main CSS, but keep for overrides */
  .back-btn { margin-bottom: 1.5rem; }
</style>
</head>
<body>

<header>
    <div class="logo-row">
        <div class="logo-container">
            <img src="passi city college logo.jpg" alt="PCC Logo">
            <div class="logo-text">Passi City College</div>
        </div>
        <div class="logo-container">
            <img src="BSIT 2.png" alt="BSIT Logo">
            <div class="logo-text">Bachelor of Science Information Technology</div>
        </div>
    </div>
    <h1>Student Grading Records</h1>
</header>

<div class="container">
    <button class="back-btn" onclick="goBack()">⬅ Back to Grading</button>

    <div class="table-wrapper">
        <table id="recordTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Section</th>
                    <th>Quiz (20%)</th>
                    <th>Lab (30%)</th>
                    <th>Assign (10%)</th>
                    <th>Attend (10%)</th>
                    <th>Major (30%)</th>
                    <th>Final Grade</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Records populated by JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
function goBack() {
    window.history.back();
}

function getRemark(score) {
    if (score >= 90) return 'Excellent';
    if (score >= 85) return 'Very Good';
    if (score >= 80) return 'Good';
    if (score >= 75) return 'Passed';
    return 'Failed';
}

function displayRecords() {
    const tbody = document.querySelector('#recordTable tbody');
    tbody.innerHTML = '';

    let records = JSON.parse(localStorage.getItem('records')) || [];
    
    if (records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:2.5rem; font-style:italic; background:rgba(255,255,255,0.1);">No records yet. Add from Grading page!</td></tr>';
        return;
    }
    
    records.forEach((record, index) => {
        const row = tbody.insertRow();
        row.innerHTML = `
            <td title="${record.name}">${record.name.length > 20 ? record.name.substring(0,20)+'...' : record.name}</td>
            <td>${record.section}</td>
            <td>${(record.quiz || 0).toFixed(1)} ${getRemark(record.quiz)}</td>
            <td>${(record.laboratory || 0).toFixed(1)} ${getRemark(record.laboratory)}</td>
            <td>${(record.assignment || 0).toFixed(1)} ${getRemark(record.assignment)}</td>
            <td>${(record.attendance || 0).toFixed(1)} ${getRemark(record.attendance)}</td>
            <td>${(record.majorExam || 0).toFixed(1)} ${getRemark(record.majorExam)}</td>
            <td class="final-grade ${record.total >= 75 ? 'passed' : 'failed'}">${(record.total || 0).toFixed(2)} ${getRemark(record.total)}</td>
            <td><button onclick="deleteRecord(${index})">Delete</button></td>
        `;
    });
}

function deleteRecord(index) {
    if (confirm('Delete this record?')) {
        let records = JSON.parse(localStorage.getItem('records')) || [];
        records.splice(index, 1);
        localStorage.setItem('records', JSON.stringify(records));
        displayRecords();
    }
}

window.onload = displayRecords;
</script>
</body>
</html>
